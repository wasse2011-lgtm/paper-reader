<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>PubMed Paper Reader</title>
<link rel="manifest" href="./manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bgc:#1a1d27;--bgi:#1e2130;--bgd:#13151d;
  --tx:#e4e4e7;--td:#9193a0;--tf:#5c5e6e;
  --ac:#60a5fa;--acd:#2563eb;--gr:#4ade80;--am:#f59e0b;
  --bd:#2a2d3a;--r:12px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.hd{position:sticky;top:0;z-index:100;padding:calc(var(--st)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--bd)}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.htl{font-size:18px;font-weight:700}
.ha{display:flex;gap:8px;align-items:center}
.sbtn{display:flex;align-items:center;gap:6px;background:var(--acd);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
.sbtn:active{opacity:.7}
.sbtn.sy .si{animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd.on{background:var(--gr)}.sd.off{background:#f87171}
.sbar{position:relative;margin-bottom:10px}
.sinp{width:100%;background:var(--bgi);border:1px solid var(--bd);border-radius:10px;padding:10px 12px 10px 36px;color:var(--tx);font-size:14px;outline:none}
.sinp:focus{border-color:var(--ac)}.sinp::placeholder{color:var(--tf)}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tf);font-size:14px}
.fl{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.fl::-webkit-scrollbar{display:none}
.fc{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--td);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.fc.a{background:var(--ac);color:#fff;border-color:var(--ac)}
.fc.ag{background:var(--gr);color:#000;border-color:var(--gr)}
.fc.aa{background:var(--am);color:#000;border-color:var(--am)}
.fb{display:inline-block;margin-left:4px;padding:0 5px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(255,255,255,.2)}
.pl{padding:12px 16px calc(var(--sb)+20px)}
.pcnt{font-size:12px;color:var(--tf);margin-bottom:10px}

/* カードラッパー */
.cw{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:10px}
/* スワイプ背景: 既読カードでは非表示 */
.swb{position:absolute;top:0;bottom:0;right:0;width:90px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:var(--r);pointer-events:none}
.swb.tr{background:var(--gr);color:#000}
.swb.tu{background:var(--am);color:#000}
/* カード本体: 常に不透明な背景 */
.cd{position:relative;z-index:1;background:var(--bgc);border-radius:var(--r);padding:14px 16px;cursor:pointer;border:1px solid transparent;touch-action:pan-y}
/* 既読カード: opacityではなくテキスト色を暗くする */
.cd.rd{border-left:3px solid var(--gr)}
.cd.rd .ptt{color:var(--td)}
.cd.rd .pjn{color:var(--tf)}
.cd.rd .plb{opacity:.5}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.plb{flex-shrink:0;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--acd);color:var(--ac);letter-spacing:.03em}
.pdt{font-size:11px;color:var(--tf);flex-shrink:0}
.ptt{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;color:var(--tx)}
.pjn{font-size:12px;color:var(--td)}
.pbt{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.pm{font-size:11px;color:var(--ac)}
.prd{font-size:10px;color:var(--tf);margin-left:8px}
.sr{display:flex;gap:1px}
.st{background:none;border:none;font-size:16px;padding:0 1px;cursor:pointer;color:var(--tf);line-height:1;-webkit-tap-highlight-color:transparent}
.st.on{color:var(--am)}

/* 詳細 */
.dov{position:fixed;inset:0;z-index:200;background:var(--bgd);transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;will-change:transform}
.dov.open{transform:translateX(0)}
.dh{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;padding:calc(var(--st)+10px) 16px 10px;background:var(--bgd);border-bottom:1px solid var(--bd)}
.bb{background:none;border:none;color:var(--ac);font-size:16px;cursor:pointer;padding:4px;display:flex;align-items:center}
.dht{font-size:14px;font-weight:600;color:var(--td);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
.dn{display:flex;gap:4px}
.nb{background:none;border:1px solid var(--bd);color:var(--td);border-radius:8px;width:34px;height:34px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nb:disabled{opacity:.3}.nb:active:not(:disabled){background:var(--bgi)}
.db{padding:16px 16px calc(var(--sb)+40px)}
.dm{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.di{font-size:12px;color:var(--td);background:var(--bgi);padding:4px 10px;border-radius:6px}
.ds{margin-bottom:20px}
.dl{font-size:11px;font-weight:700;color:var(--tf);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.dti{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:16px}
.da{font-size:14px;line-height:1.8;white-space:pre-wrap}
.dae{font-size:13px;line-height:1.7;color:var(--td);white-space:pre-wrap}
.dau{font-size:13px;color:var(--td);line-height:1.6}
.dlk{display:inline-block;margin-top:8px;color:var(--ac);text-decoration:none;font-size:13px;font-weight:500}
.co{margin-bottom:20px}
.ct{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--tf);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;padding:0;margin-bottom:6px}
.ca{transition:transform .2s;font-size:10px}
.ct.op .ca{transform:rotate(90deg)}
.cb{display:none}.cb.op{display:block}
.cpg{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.cp{display:flex;align-items:center;gap:6px;padding:10px 14px;border:1px solid var(--bd);border-radius:10px;background:var(--bgi);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;flex:1;justify-content:center}
.cp:active{background:var(--acd);border-color:var(--ac)}
.dact{margin-top:24px;padding-top:20px;border-top:1px solid var(--bd)}
.ar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tgl{width:44px;height:26px;border-radius:13px;border:none;background:var(--bd);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--gr)}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}
.tgl.on::after{transform:translateX(18px)}
.al{font-size:14px;font-weight:500}
.dsr{display:flex;gap:4px}
.dsb{background:none;border:none;font-size:24px;padding:2px;cursor:pointer;color:var(--tf);-webkit-tap-highlight-color:transparent}
.dsb.on{color:var(--am)}
.mt{width:100%;min-height:100px;background:var(--bgi);border:1px solid var(--bd);border-radius:10px;padding:12px;color:var(--tx);font-size:14px;font-family:inherit;line-height:1.6;resize:vertical;outline:none}
.mt:focus{border-color:var(--ac)}.mt::placeholder{color:var(--tf)}
.mh{font-size:11px;color:var(--tf);margin-top:6px}
.su{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
.sut{font-size:22px;font-weight:700;margin-bottom:8px}
.sud{font-size:14px;color:var(--td);margin-bottom:24px;line-height:1.6}
.sui{width:100%;max-width:400px;background:var(--bgi);border:1px solid var(--bd);border-radius:10px;padding:12px;color:var(--tx);font-size:14px;font-family:monospace;outline:none;margin-bottom:12px}
.sui:focus{border-color:var(--ac)}.sui::placeholder{color:var(--tf)}
.sub{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer}
.sub:active{opacity:.8}
.sun{font-size:12px;color:var(--tf);margin-top:16px;line-height:1.5;max-width:400px}
.em{text-align:center;padding:60px 20px;color:var(--tf)}
.emi{font-size:48px;margin-bottom:12px}.emt{font-size:14px;line-height:1.6}
.lb{position:fixed;top:0;left:0;height:3px;background:var(--ac);z-index:999;transition:width .3s}
.toast{position:fixed;bottom:calc(var(--sb)+24px);left:50%;transform:translateX(-50%) translateY(100px);background:var(--bgc);color:var(--tx);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="su" class="su" style="display:none">
  <div class="sut">PubMed Paper Reader</div>
  <div class="sud">GAS Web AppのURLとAPIキーを設定してください。</div>
  <input id="suUrl" class="sui" placeholder="GAS Web App URL (https://script.google.com/...)"/>
  <input id="suKey" class="sui" placeholder="API Secret Key"/>
  <button class="sub" onclick="saveSetup()">設定を保存</button>
  <div class="sun">GAS Web AppをデプロイしたURL（/exec）と、Config.gs の API_SECRET を入力。</div>
</div>
<div id="ma" style="display:none">
  <div class="lb" id="lb" style="width:0"></div>
  <div class="hd">
    <div class="ht"><div class="htl">📄 Paper Reader</div><div class="ha"><div class="sd" id="sd"></div><button class="sbtn" id="sy" onclick="syncData()"><span class="si">↻</span> 同期</button></div></div>
    <div class="sbar"><span class="sico">🔍</span><input class="sinp" id="si" placeholder="タイトル・キーワードで検索"/></div>
    <div class="fl" id="fl"></div>
  </div>
  <div class="pl" id="pl"></div>
</div>
<div class="dov" id="dov">
  <div class="dh"><button class="bb" id="bk">← 戻る</button><div class="dht" id="dht"></div><div class="dn"><button class="nb" id="np">◀</button><button class="nb" id="nn">▶</button></div></div>
  <div class="db" id="dbdy"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const EM={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function E(s){return s?String(s).replace(/[&<>"']/g,c=>EM[c]):''}
function fD(s){if(!s)return'';try{const d=new Date(s);return isNaN(d)?s:d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')}catch{return s}}
function sL(p){document.getElementById('lb').style.width=p+'%'}
let _tt;function sT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500)}

// IDB
const DBN='PaperReaderDB',DBV=3;
function oDB(){return new Promise((r,j)=>{const q=indexedDB.open(DBN,DBV);q.onupgradeneeded=e=>{const d=e.target.result;['papers','pending','config'].forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n,{keyPath:n==='config'?'key':'pmid'})});};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dGA(s){const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readonly');t.objectStore(s).getAll().onsuccess=e=>r(e.target.result);t.onerror=()=>j(t.error)})}
async function dP(s,v){const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(v);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dC(s){const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).clear();t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dPB(s,items){if(!items.length)return;const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');const st=t.objectStore(s);for(const i of items)st.put(i);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}

// State
let C={url:'',key:''},P=[],F=[],aF='all',cP=null,ol=navigator.onLine;
const AIP=`論文検索してヒットした論文をお渡しします。そのアブストラクトの翻訳、具体的な臨床への役立つ情報を抽出をして教えてください。さらに、関連する背景知識も検索し、簡潔に教えてください。さらに疑問となりそうな事について深掘りを提案してください。`;

// Config
async function lC(){try{const c=await dGA('config');const o=c.find(x=>x.key==='ac');if(o&&o.u&&o.k){C.url=o.u;C.key=o.k;return true}}catch(e){}return false}
async function saveSetup(){
  const u=document.getElementById('suUrl').value.trim(),k=document.getElementById('suKey').value.trim();
  if(!u||!k){sT('URLとAPIキーを入力');return}
  C.url=u;C.key=k;await dP('config',{key:'ac',u,k});
  document.getElementById('su').style.display='none';document.getElementById('ma').style.display='';syncData();
}

// JSONP
let _jc=0;
function jp(p){return new Promise((r,j)=>{
  const cb='_j'+ _jc++;const tm=setTimeout(()=>{cl();j(new Error('Timeout'))},30000);
  function cl(){clearTimeout(tm);delete window[cb];const e=document.getElementById(cb);if(e)e.remove()}
  window[cb]=d=>{cl();r(d)};
  const q=new URLSearchParams({...p,key:C.key,callback:cb});
  const s=document.createElement('script');s.id=cb;s.src=C.url+'?'+q;s.onerror=()=>{cl();j(new Error('JSONP failed'))};document.head.appendChild(s);
})}

// Sync - ローカルデータとマージ
async function syncData(){
  if(!ol){sT('オフラインです');return}
  const btn=document.getElementById('sy');btn.classList.add('sy');sL(30);
  try{
    // Push pending
    const pend=await dGA('pending');
    if(pend.length)try{await jp({action:'bulkUpdate',data:JSON.stringify({action:'bulkUpdate',updates:pend}),key:C.key});await dC('pending')}catch(e){console.warn('Push fail:',e)}
    sL(50);
    // Pull
    const data=await jp({action:'list',key:C.key});sL(80);
    if(data.papers){
      // ローカルデータのマップ（ローカル変更を保持するため）
      const localMap=new Map();
      for(const lp of P) localMap.set(lp.pmid,lp);
      // 未送信の変更があるPMIDセット
      const pendSet=new Set(pend.map(x=>x.pmid));

      const merged=data.papers.map(sp=>{
        const lp=localMap.get(sp.pmid);
        const item={
          ...sp,
          rating:Number(sp.rating)||0,
          checked:!!sp.checked,
          // ローカルにのみ存在するフィールドを保持
          readAt:(lp&&lp.readAt)||''
        };
        // pendingに残っていたら（pushが失敗した可能性）ローカルの値を優先
        if(lp && pendSet.has(sp.pmid)){
          item.checked=lp.checked;
          item.memo=lp.memo||sp.memo||'';
          item.rating=lp.rating;
          item.readAt=lp.readAt||'';
        }
        // サーバーのratingが0でローカルに値がある場合もローカルを優先
        // （サーバー側に14列目がまだない場合の対策）
        if(lp && item.rating===0 && lp.rating>0) item.rating=lp.rating;
        if(lp && !item.readAt && lp.readAt) item.readAt=lp.readAt;
        if(lp && !item.checked && lp.checked){item.checked=true;item.readAt=lp.readAt||''}
        return item;
      });
      await dPB('papers',merged);
      P=merged;sortP();rF();rL();
      sT('同期完了: '+P.length+'件');
    }
  }catch(e){console.error(e);sT('同期エラー: '+e.message)}
  finally{btn.classList.remove('sy');sL(100);setTimeout(()=>sL(0),300)}
}
async function loadL(){
  try{P=(await dGA('papers')).map(p=>({...p,rating:p.rating||0,checked:!!p.checked,readAt:p.readAt||''}));sortP();rF();rL()}catch(e){}
}
function sortP(){P.sort((a,b)=>{if(a.checked!==b.checked)return a.checked?1:-1;const x=a.fetchedDate||a.pubDate||'',y=b.fetchedDate||b.pubDate||'';return x<y?1:x>y?-1:0})}

// Filter
function gF(f){switch(f){case'all':return P;case'unread':return P.filter(p=>!p.checked);case'interested':return P.filter(p=>p.rating>=1);default:return P.filter(p=>p.queryLabel===f)}}
function rF(){
  const c=document.getElementById('fl');
  const ls=[...new Set(P.map(p=>p.queryLabel).filter(Boolean))];
  let h=fc('all','すべて',P.length,'')+fc('unread','未読',P.filter(p=>!p.checked).length,'aa')+fc('interested','興味あり',P.filter(p=>p.rating>=1).length,'ag');
  for(const l of ls)h+=fc(l,l,gF(l).length,'');
  c.innerHTML=h;
}
function fc(id,lb,n,ac){return`<button class="fc${aF===id?' '+(ac||'a'):''}" data-f="${id}">${E(lb)}<span class="fb">${n}</span></button>`}

// List render
function rL(){
  const c=document.getElementById('pl'),s=document.getElementById('si').value.trim().toLowerCase();
  let list=gF(aF);
  if(s)list=list.filter(p=>[p.titleJa,p.titleEn,p.abstractJa,p.journal,p.authors,p.memo].some(v=>(v||'').toLowerCase().includes(s)));
  F=list;
  if(!list.length){c.innerHTML=`<div class="em"><div class="emi">📭</div><div class="emt">${P.length?'条件に一致する論文がありません。':'論文データがありません。<br>「同期」でデータを取得。'}</div></div>`;return}
  const a=new Array(list.length+1);
  a[0]=`<div class="pcnt">${list.length}件</div>`;
  for(let i=0;i<list.length;i++){
    const p=list[i];
    const rc=p.checked?' rd':'',sl=p.checked?'未読':'既読',sc=p.checked?'tu':'tr';
    const memo=p.memo?'<span class="pm">📝</span>':'';
    const rdAt=p.readAt?`<span class="prd">既読 ${fD(p.readAt)}</span>`:'';
    let stars='';for(let j=1;j<=5;j++)stars+=`<button class="st${j<=p.rating?' on':''}" data-p="${p.pmid}" data-s="${j}">★</button>`;
    a[i+1]=`<div class="cw" data-p="${p.pmid}"><div class="swb ${sc}">${sl}</div><div class="cd${rc}" data-p="${p.pmid}"><div class="ch"><span class="plb">${E(p.queryLabel||'')}</span><span class="pdt">${fD(p.pubDate)}</span></div><div class="ptt">${E(p.titleJa||p.titleEn||'(No title)')}</div><div class="pjn">${E(p.journal||'')}</div><div class="pbt"><div class="sr">${stars}</div><div>${memo}${rdAt}</div></div></div></div>`;
  }
  c.innerHTML=a.join('');
}

// Event delegation: list
let _sx=0,_sy=0,_dx=0,_dr=null,_lk=false,_sc=null;
const pl=document.getElementById('pl');
pl.addEventListener('touchstart',function(e){
  const w=e.target.closest('.cw');if(!w)return;
  _sc=w.querySelector('.cd');_sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_dx=0;_dr=null;_lk=false;_sc.style.transition='none';
},{passive:true});
pl.addEventListener('touchmove',function(e){
  if(!_sc||_lk)return;
  const cx=e.touches[0].clientX-_sx,cy=e.touches[0].clientY-_sy;
  if(_dr===null&&(Math.abs(cx)>8||Math.abs(cy)>8))_dr=Math.abs(cy)>Math.abs(cx)?'v':'h';
  if(_dr==='v'){_lk=true;return}
  if(_dr==='h'){_dx=Math.min(0,Math.max(-100,cx));_sc.style.transform=`translateX(${_dx}px)`}
},{passive:true});
pl.addEventListener('touchend',function(){
  if(!_sc)return;
  _sc.style.transition='transform .15s ease';
  if(_dx<-50){_sc.style.transform='translateX(-100px)';const pm=_sc.closest('.cw').dataset.p;requestAnimationFrame(()=>tR(pm))}
  else if(_dr==='h')_sc.style.transform='translateX(0)';
  _sc=null;
},{passive:true});

// ★ tap & card tap (delegation)
pl.addEventListener('click',function(e){
  const sb=e.target.closest('.st');
  if(sb){e.stopPropagation();sR(sb.dataset.p,+sb.dataset.s);return}
  const cd=e.target.closest('.cd');
  if(cd&&!e.target.closest('.sr'))openD(cd.dataset.p);
});
// Filter delegation
document.getElementById('fl').addEventListener('click',function(e){const c=e.target.closest('.fc');if(c){aF=c.dataset.f;rF();rL()}});
// Search debounce
let _st;document.getElementById('si').addEventListener('input',function(){clearTimeout(_st);_st=setTimeout(rL,200)});

// Toggle read
async function tR(pm){
  const p=P.find(x=>x.pmid===pm);if(!p)return;
  p.checked=!p.checked;
  p.readAt=p.checked?new Date().toISOString():'';
  await sC(p);sortP();rF();rL();
  sT(p.checked?'既読にしました':'未読に戻しました');
}

// ★ Rating - 即座にDOMを更新、全体再描画はバッジのみ
async function sR(pm,v){
  const p=P.find(x=>x.pmid===pm);if(!p)return;
  p.rating=p.rating===v?0:v;
  // ターゲットDOMのみ更新（一覧のスターボタン）
  const cw=document.querySelector(`.cw[data-p="${pm}"]`);
  if(cw){
    const btns=cw.querySelectorAll('.st');
    btns.forEach((b,i)=>{b.classList.toggle('on',i<p.rating)});
  }
  // 詳細画面のスターも更新
  if(cP===pm){const el=document.getElementById('dss');if(el){const bs=el.querySelectorAll('.dsb');bs.forEach((b,i)=>{b.classList.toggle('on',i<p.rating)})}}
  // バッジ件数のみ更新
  rF();
  // 非同期で保存（UIブロックしない）
  sC(p);
}

// Detail
function dSt(pm,r){let h='';for(let i=1;i<=5;i++)h+=`<button class="dsb${i<=r?' on':''}" data-s="${i}">★</button>`;return h}
function openD(pm){
  const p=P.find(x=>x.pmid===pm);if(!p)return;cP=pm;
  const ov=document.getElementById('dov'),body=document.getElementById('dbdy');
  document.getElementById('dht').textContent=p.queryLabel||'';
  const pu=`https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/`,doi=p.doi?`https://doi.org/${p.doi}`:'';
  body.innerHTML=`
<div class="dti">${E(p.titleJa||p.titleEn||'')}</div>
<div class="dm"><span class="di">${E(p.journal||'')}</span><span class="di">${fD(p.pubDate)}</span><span class="di">PMID:${p.pmid}</span>${p.readAt?`<span class="di">既読 ${fD(p.readAt)}</span>`:''}</div>
<div class="ds"><div class="dl">アブストラクト（日本語）</div><div class="da">${E(p.abstractJa||'(アブストラクトなし)')}</div></div>
<div class="co"><button class="ct" onclick="this.classList.toggle('op');this.nextElementSibling.classList.toggle('op')"><span class="ca">▶</span> Abstract（原文）</button><div class="cb"><div class="dae">${E(p.abstractEn||'(No abstract)')}</div></div></div>
<div class="co"><button class="ct" onclick="this.classList.toggle('op');this.nextElementSibling.classList.toggle('op')"><span class="ca">▶</span> 原文タイトル</button><div class="cb"><div class="dae">${E(p.titleEn||'')}</div></div></div>
<div class="ds"><div class="dl">著者</div><div class="dau">${E(p.authors||'')}</div></div>
<div><a class="dlk" href="${pu}" target="_blank">PubMedで開く ↗</a>${doi?`<br><a class="dlk" href="${doi}" target="_blank">DOI: ${E(p.doi)} ↗</a>`:''}</div>
<div class="cpg"><button class="cp" data-c="a">📋 コピー</button><button class="cp" data-c="p">🤖 AI用コピー</button></div>
<div class="dact">
  <div class="ar"><button class="tgl${p.checked?' on':''}" id="tgl"></button><span class="al">既読</span></div>
  <div class="ar"><span class="al" style="margin-right:4px">興味度</span><div class="dsr" id="dss">${dSt(pm,p.rating)}</div></div>
  <div class="dl" style="margin-top:14px">メモ</div>
  <textarea class="mt" id="mt" placeholder="メモを入力...">${E(p.memo||'')}</textarea>
  <div class="mh">フォーカスを外すと自動保存</div>
</div>`;
  uN();ov.style.transform='';ov.style.transition='transform .3s ease';ov.classList.add('open');
}
function clD(){const o=document.getElementById('dov');o.style.transition='transform .3s ease';o.style.transform='translateX(100%)';setTimeout(()=>{o.classList.remove('open');o.style.transform='';o.style.transition=''},350);cP=null}
function nD(d){if(!cP)return;const i=F.findIndex(p=>p.pmid===cP);const n=i+d;if(n>=0&&n<F.length)openD(F[n].pmid)}
function uN(){const i=F.findIndex(p=>p.pmid===cP);document.getElementById('np').disabled=i<=0;document.getElementById('nn').disabled=i<0||i>=F.length-1}

// Detail events
const dov=document.getElementById('dov');
dov.addEventListener('click',function(e){
  const cp=e.target.closest('[data-c]');if(cp){cp.dataset.c==='a'?cpA():cpP();return}
  if(e.target.closest('#tgl')){tRD();return}
  const sb=e.target.closest('.dsb');if(sb){sR(cP,+sb.dataset.s);return}
});
document.getElementById('bk').addEventListener('click',clD);
document.getElementById('np').addEventListener('click',()=>nD(-1));
document.getElementById('nn').addEventListener('click',()=>nD(1));
dov.addEventListener('focusout',function(e){if(e.target.id==='mt')sM()});

async function tRD(){
  if(!cP)return;const p=P.find(x=>x.pmid===cP);if(!p)return;
  p.checked=!p.checked;p.readAt=p.checked?new Date().toISOString():'';
  document.getElementById('tgl').classList.toggle('on',p.checked);
  await sC(p);sortP();rF();rL();
}
async function sM(){
  if(!cP)return;const p=P.find(x=>x.pmid===cP);if(!p)return;
  const t=document.getElementById('mt');if(!t||t.value===p.memo)return;
  p.memo=t.value;await sC(p);rL();sT('メモ保存');
}

// Copy
function cpA(){const p=P.find(x=>x.pmid===cP);if(!p)return;cc([`Title: ${p.titleEn}`,`Journal: ${p.journal}`,`PMID: ${p.pmid}`,p.doi?`DOI: ${p.doi}`:'',`Authors: ${p.authors}`,'','Abstract:',p.abstractEn||''].filter(Boolean).join('\n'));sT('コピーしました')}
function cpP(){const p=P.find(x=>x.pmid===cP);if(!p)return;cc([AIP,'','---','',`Title: ${p.titleEn}`,`Journal: ${p.journal}`,`PMID: ${p.pmid}`,p.doi?`DOI: ${p.doi}`:'',`Authors: ${p.authors}`,'','Abstract:',p.abstractEn||''].filter(Boolean).join('\n'));sT('AI用コピー完了')}
function cc(t){if(navigator.clipboard?.writeText)navigator.clipboard.writeText(t).catch(()=>fc2(t));else fc2(t)}
function fc2(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;left:-9999px';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)}

// Detail swipe back
(function(){let sx=0,tr=false;
dov.addEventListener('touchstart',e=>{if(e.touches[0].clientX>30){tr=false;return}sx=e.touches[0].clientX;tr=true;dov.style.transition='none'},{passive:true});
dov.addEventListener('touchmove',e=>{if(!tr)return;const dx=e.touches[0].clientX-sx;if(dx>0)dov.style.transform=`translateX(${dx}px)`},{passive:true});
dov.addEventListener('touchend',e=>{if(!tr)return;tr=false;const dx=e.changedTouches[0].clientX-sx;dov.style.transition='transform .3s ease';dx>100?clD():dov.style.transform='translateX(0)'},{passive:true});
})();

// Save
async function sC(p){
  await dP('papers',{...p});
  const d={pmid:p.pmid,checked:p.checked,memo:p.memo,rating:p.rating};
  if(ol){try{await jp({action:'update',data:JSON.stringify({action:'update',...d}),key:C.key})}catch(e){await dP('pending',d)}}
  else await dP('pending',d);
}

// Online/offline
function uSD(){const d=document.getElementById('sd');d.className='sd '+(ol?'on':'off')}
window.addEventListener('online',()=>{ol=true;uSD();sT('オンライン復帰');syncData()});
window.addEventListener('offline',()=>{ol=false;uSD();sT('オフラインモード')});

// Init
async function init(){
  if('serviceWorker'in navigator)try{await navigator.serviceWorker.register('./sw.js')}catch(e){}
  if(!await lC()){document.getElementById('su').style.display='';return}
  document.getElementById('ma').style.display='';
  uSD(); // ← 初期化時にステータスドット設定
  await loadL();if(ol)syncData();
}
init();
</script>
</body>
</html>
