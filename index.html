<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>PubMed Paper Reader</title>
<link rel="manifest" href="./manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg-card:#1a1d27;--bg-card-hover:#222636;--bg-detail:#13151d;
  --bg-input:#1e2130;--text:#e4e4e7;--text-dim:#9193a0;--text-faint:#5c5e6e;
  --accent:#60a5fa;--accent-dim:#2563eb;--green:#4ade80;--amber:#f59e0b;
  --border:#2a2d3a;--radius:12px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.header{position:sticky;top:0;z-index:100;padding:calc(var(--safe-top)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.02em}
.header-actions{display:flex;gap:8px;align-items:center}
.sync-btn{display:flex;align-items:center;gap:6px;background:var(--accent-dim);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
.sync-btn:active{opacity:.7}
.sync-btn.syncing .sync-icon{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.status-dot.offline{background:#f87171}
.search-bar{position:relative;margin-bottom:10px}
.search-input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 36px;color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-faint)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:14px}
.filters{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-chip.act-g{background:var(--green);color:#000;border-color:var(--green)}
.filter-chip.act-a{background:var(--amber);color:#000;border-color:var(--amber)}
.fbadge{display:inline-block;margin-left:4px;padding:0 5px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(255,255,255,.2)}
.paper-list{padding:12px 16px calc(var(--safe-bottom)+20px)}
.paper-count{font-size:12px;color:var(--text-faint);margin-bottom:10px}
.pcw{position:relative;overflow:hidden;border-radius:var(--radius);margin-bottom:10px}
.swbg{position:absolute;top:0;bottom:0;right:0;width:90px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:var(--radius);pointer-events:none}
.swbg.tr{background:var(--green);color:#000}
.swbg.tu{background:var(--amber);color:#000}
.pc{position:relative;z-index:1;background:var(--bg-card);border-radius:var(--radius);padding:14px 16px;cursor:pointer;border:1px solid transparent;touch-action:pan-y}
.pc.rd{opacity:.55;border-left:3px solid var(--green)}
.pch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.plbl{flex-shrink:0;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--accent-dim);color:var(--accent);letter-spacing:.03em}
.pdt{font-size:11px;color:var(--text-faint);flex-shrink:0}
.ptt{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pjn{font-size:12px;color:var(--text-dim)}
.pbot{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.pmemo{font-size:11px;color:var(--accent)}
.sr{display:flex;gap:1px}
.sb{background:none;border:none;font-size:16px;padding:0 1px;cursor:pointer;color:var(--text-faint);line-height:1;-webkit-tap-highlight-color:transparent}
.sb.on{color:var(--amber)}
.detail-overlay{position:fixed;inset:0;z-index:200;background:var(--bg-detail);transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;will-change:transform}
.detail-overlay.open{transform:translateX(0)}
.dh{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;padding:calc(var(--safe-top)+10px) 16px 10px;background:var(--bg-detail);border-bottom:1px solid var(--border)}
.bbtn{background:none;border:none;color:var(--accent);font-size:16px;cursor:pointer;padding:4px;display:flex;align-items:center}
.dht{font-size:14px;font-weight:600;color:var(--text-dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
.dnav{display:flex;gap:4px}
.nbtn{background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:8px;width:34px;height:34px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nbtn:disabled{opacity:.3}
.nbtn:active:not(:disabled){background:var(--bg-input)}
.dbody{padding:16px 16px calc(var(--safe-bottom)+40px)}
.dmeta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.dmi{font-size:12px;color:var(--text-dim);background:var(--bg-input);padding:4px 10px;border-radius:6px}
.dsec{margin-bottom:20px}
.dsl{font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.dtitle{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:16px}
.dabs{font-size:14px;line-height:1.8;white-space:pre-wrap}
.dabse{font-size:13px;line-height:1.7;color:var(--text-dim);white-space:pre-wrap}
.dauth{font-size:13px;color:var(--text-dim);line-height:1.6}
.dlink{display:inline-block;margin-top:8px;color:var(--accent);text-decoration:none;font-size:13px;font-weight:500}
.coll{margin-bottom:20px}
.ctog{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-faint);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;padding:0;margin-bottom:6px}
.carr{transition:transform .2s;font-size:10px}
.ctog.op .carr{transform:rotate(90deg)}
.cbod{display:none}
.cbod.op{display:block}
.cpgrp{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.cpbtn{display:flex;align-items:center;gap:6px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--bg-input);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;flex:1;justify-content:center}
.cpbtn:active{background:var(--accent-dim);border-color:var(--accent)}
.dact{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.arow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ctgl{width:44px;height:26px;border-radius:13px;border:none;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.ctgl.on{background:var(--green)}
.ctgl::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}
.ctgl.on::after{transform:translateX(18px)}
.albl{font-size:14px;font-weight:500}
.dstars{display:flex;gap:4px}
.dsb{background:none;border:none;font-size:24px;padding:2px;cursor:pointer;color:var(--text-faint);-webkit-tap-highlight-color:transparent}
.dsb.on{color:var(--amber)}
.mtxt{width:100%;min-height:100px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;font-family:inherit;line-height:1.6;resize:vertical;outline:none}
.mtxt:focus{border-color:var(--accent)}
.mtxt::placeholder{color:var(--text-faint)}
.mhint{font-size:11px;color:var(--text-faint);margin-top:6px}
.setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
.setup-title{font-size:22px;font-weight:700;margin-bottom:8px}
.setup-desc{font-size:14px;color:var(--text-dim);margin-bottom:24px;line-height:1.6}
.sinp{width:100%;max-width:400px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:14px;font-family:monospace;outline:none;margin-bottom:12px}
.sinp:focus{border-color:var(--accent)}
.sinp::placeholder{color:var(--text-faint)}
.sbtn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer}
.sbtn:active{opacity:.8}
.snote{font-size:12px;color:var(--text-faint);margin-top:16px;line-height:1.5;max-width:400px}
.empty{text-align:center;padding:60px 20px;color:var(--text-faint)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.6}
.lbar{position:fixed;top:0;left:0;height:3px;background:var(--accent);z-index:999;transition:width .3s}
.toast{position:fixed;bottom:calc(var(--safe-bottom)+24px);left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="setupScreen" class="setup-screen" style="display:none">
  <div class="setup-title">PubMed Paper Reader</div>
  <div class="setup-desc">GAS Web AppのURLとAPIキーを設定してください。</div>
  <input id="setupUrl" class="sinp" placeholder="GAS Web App URL (https://script.google.com/...)" />
  <input id="setupKey" class="sinp" placeholder="API Secret Key" />
  <button class="sbtn" onclick="saveSetup()">設定を保存</button>
  <div class="snote">GAS Web AppをデプロイしたURL（/exec で終わるもの）と、Config.gs に設定した API_SECRET を入力してください。</div>
</div>

<div id="mainApp" style="display:none">
  <div class="lbar" id="lbar" style="width:0"></div>
  <div class="header">
    <div class="header-top">
      <div class="header-title">📄 Paper Reader</div>
      <div class="header-actions">
        <div class="status-dot" id="statusDot"></div>
        <button class="sync-btn" id="syncBtn" onclick="syncData()"><span class="sync-icon">↻</span> 同期</button>
      </div>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="タイトル・キーワードで検索" />
    </div>
    <div class="filters" id="filters"></div>
  </div>
  <div class="paper-list" id="plist"></div>
</div>

<div class="detail-overlay" id="dov">
  <div class="dh">
    <button class="bbtn" id="backBtn">← 戻る</button>
    <div class="dht" id="dht"></div>
    <div class="dnav">
      <button class="nbtn" id="np" title="前">◀</button>
      <button class="nbtn" id="nn" title="次">▶</button>
    </div>
  </div>
  <div class="dbody" id="dbody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── 高速ユーティリティ ───
const _escMap = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function E(s){return s?String(s).replace(/[&<>"']/g,c=>_escMap[c]):''}
function fmtD(s){if(!s)return'';try{const d=new Date(s);if(isNaN(d))return s;return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')}catch{return s}}
function showL(p){document.getElementById('lbar').style.width=p+'%'}
let _toastT;function showT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>t.classList.remove('show'),2500)}

// ─── IndexedDB（バッチ対応）───
const DB='PaperReaderDB',DBV=2;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB,DBV);q.onupgradeneeded=e=>{const d=e.target.result;['papers','pending','config'].forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n,{keyPath:n==='papers'||n==='pending'?'pmid':'key'})});};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dbGetAll(s){const d=await openDB();return new Promise((r,j)=>{const t=d.transaction(s,'readonly');const q=t.objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dbPut(s,data){const d=await openDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(data);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dbClear(s){const d=await openDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).clear();t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
// 一括書き込み（1トランザクション）
async function dbPutBatch(s,items){
  if(!items.length)return;
  const d=await openDB();
  return new Promise((r,j)=>{
    const t=d.transaction(s,'readwrite');
    const st=t.objectStore(s);
    for(const item of items)st.put(item);
    t.oncomplete=()=>r();
    t.onerror=()=>j(t.error);
  });
}

// ─── 状態 ───
let CFG={url:'',key:''},papers=[],filtered=[],activeF='all',curPmid=null,online=navigator.onLine;
const AI_PROMPT=`論文検索してヒットした論文をお渡しします。そのアブストラクトの翻訳、具体的な臨床への役立つ情報を抽出をして教えてください。さらに、関連する背景知識も検索し、簡潔に教えてください。さらに疑問となりそうな事について深掘りを提案してください。`;

// ─── 設定 ───
async function loadCfg(){try{const c=await dbGetAll('config');const o=c.find(x=>x.key==='appConfig');if(o&&o.url&&o.apiKey){CFG.url=o.url;CFG.key=o.apiKey;return true}}catch(e){}return false}
async function saveSetup(){
  const u=document.getElementById('setupUrl').value.trim(),k=document.getElementById('setupKey').value.trim();
  if(!u||!k){showT('URLとAPIキーを入力してください');return}
  CFG.url=u;CFG.key=k;await dbPut('config',{key:'appConfig',url:u,apiKey:k});
  document.getElementById('setupScreen').style.display='none';document.getElementById('mainApp').style.display='';syncData();
}

// ─── JSONP ───
let _jc=0;
function jp(params){return new Promise((res,rej)=>{
  const cb='_j'+Date.now()+'_'+ _jc++;
  const tm=setTimeout(()=>{cl();rej(new Error('Timeout'))},30000);
  function cl(){clearTimeout(tm);delete window[cb];const e=document.getElementById(cb);if(e)e.remove()}
  window[cb]=d=>{cl();res(d)};
  const qs=new URLSearchParams({...params,key:CFG.key,callback:cb});
  const s=document.createElement('script');s.id=cb;s.src=CFG.url+'?'+qs;s.onerror=()=>{cl();rej(new Error('JSONP failed'))};document.head.appendChild(s);
})}
function apiG(a){return jp({action:a})}
function apiP(b){const{key,...r}=b;return jp({action:r.action,data:JSON.stringify(r)})}

// ─── 同期 ───
async function syncData(){
  if(!online){showT('オフラインです');return}
  const btn=document.getElementById('syncBtn');btn.classList.add('syncing');showL(30);
  try{
    const pend=await dbGetAll('pending');
    if(pend.length)try{await apiP({action:'bulkUpdate',updates:pend});await dbClear('pending')}catch(e){console.warn('Pending push fail:',e)}
    showL(50);
    const data=await apiG('list');showL(80);
    if(data.papers){
      const items=data.papers.map(p=>({...p,rating:p.rating||0,checked:!!p.checked}));
      await dbPutBatch('papers',items);
      papers=items;sortP();renderF();renderL();
      showT('同期完了: '+papers.length+'件');
    }
  }catch(e){console.error('Sync:',e);showT('同期エラー: '+e.message)}
  finally{btn.classList.remove('syncing');showL(100);setTimeout(()=>showL(0),300)}
}
async function loadLocal(){
  try{papers=(await dbGetAll('papers')).map(p=>({...p,rating:p.rating||0,checked:!!p.checked}));sortP();renderF();renderL()}catch(e){}
}
function sortP(){papers.sort((a,b)=>{if(a.checked!==b.checked)return a.checked?1:-1;const da=a.fetchedDate||a.pubDate||'',db=b.fetchedDate||b.pubDate||'';return da<db?1:da>db?-1:0})}

// ─── フィルタ ───
function getF(f){switch(f){case'all':return papers;case'unread':return papers.filter(p=>!p.checked);case'interested':return papers.filter(p=>p.rating>=1);default:return papers.filter(p=>p.queryLabel===f)}}
function renderF(){
  const c=document.getElementById('filters');
  const labels=[...new Set(papers.map(p=>p.queryLabel).filter(Boolean))];
  const uc=papers.filter(p=>!p.checked).length,ic=papers.filter(p=>p.rating>=1).length;
  let h=chip('all','すべて',papers.length,'')+chip('unread','未読',uc,'act-a')+chip('interested','興味あり',ic,'act-g');
  for(const l of labels)h+=chip(l,l,getF(l).length,'');
  c.innerHTML=h;
}
function chip(id,label,cnt,acls){const a=activeF===id;return`<button class="filter-chip${a?' '+(acls||'active'):''}" data-fid="${id}">${E(label)}<span class="fbadge">${cnt}</span></button>`}

// ─── リスト描画 ───
function renderL(){
  const c=document.getElementById('plist');
  const s=document.getElementById('searchInput').value.trim().toLowerCase();
  let list=getF(activeF);
  if(s)list=list.filter(p=>(p.titleJa||'').toLowerCase().includes(s)||(p.titleEn||'').toLowerCase().includes(s)||(p.abstractJa||'').toLowerCase().includes(s)||(p.journal||'').toLowerCase().includes(s)||(p.authors||'').toLowerCase().includes(s)||(p.memo||'').toLowerCase().includes(s));
  filtered=list;
  if(!list.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">${papers.length?'条件に一致する論文がありません。':'論文データがありません。<br>「同期」でデータを取得してください。'}</div></div>`;return}
  // 文字列構築
  const parts=new Array(list.length+1);
  parts[0]=`<div class="paper-count">${list.length}件</div>`;
  for(let i=0;i<list.length;i++){
    const p=list[i];
    const rc=p.checked?' rd':'';
    const sl=p.checked?'未読':'既読';
    const sc=p.checked?'tu':'tr';
    const memo=p.memo?'<span class="pmemo">📝</span>':'';
    let stars='';for(let j=1;j<=5;j++)stars+=`<button class="sb${j<=p.rating?' on':''}" data-pmid="${p.pmid}" data-star="${j}">★</button>`;
    parts[i+1]=`<div class="pcw" data-pmid="${p.pmid}"><div class="swbg ${sc}">${sl}</div><div class="pc${rc}" data-pmid="${p.pmid}"><div class="pch"><span class="plbl">${E(p.queryLabel||'')}</span><span class="pdt">${fmtD(p.pubDate)}</span></div><div class="ptt">${E(p.titleJa||p.titleEn||'(No title)')}</div><div class="pjn">${E(p.journal||'')}</div><div class="pbot"><div class="sr">${stars}</div>${memo}</div></div></div>`;
  }
  c.innerHTML=parts.join('');
}

// ─── イベント委譲（一覧） ───
let _sx=0,_sy=0,_dx=0,_dir=null,_locked=false,_swCard=null;

document.getElementById('plist').addEventListener('touchstart',function(e){
  const w=e.target.closest('.pcw');if(!w)return;
  _swCard=w.querySelector('.pc');
  _sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_dx=0;_dir=null;_locked=false;
  _swCard.style.transition='none';
},{passive:true});

document.getElementById('plist').addEventListener('touchmove',function(e){
  if(!_swCard||_locked)return;
  const cx=e.touches[0].clientX-_sx,cy=e.touches[0].clientY-_sy;
  if(_dir===null&&(Math.abs(cx)>8||Math.abs(cy)>8))_dir=Math.abs(cy)>Math.abs(cx)?'v':'h';
  if(_dir==='v'){_locked=true;return}
  if(_dir==='h'){_dx=Math.min(0,Math.max(-100,cx));_swCard.style.transform=`translateX(${_dx}px)`}
},{passive:true});

document.getElementById('plist').addEventListener('touchend',function(e){
  if(!_swCard)return;
  _swCard.style.transition='transform .15s ease';
  if(_dx<-50){
    _swCard.style.transform='translateX(-100px)';
    const pmid=_swCard.closest('.pcw').dataset.pmid;
    requestAnimationFrame(()=>toggleRead(pmid));
  }else if(_dir==='h'){_swCard.style.transform='translateX(0)'}
  _swCard=null;
},{passive:true});

// ★タップ（委譲）
document.getElementById('plist').addEventListener('click',function(e){
  const star=e.target.closest('.sb');
  if(star){e.stopPropagation();setRating(star.dataset.pmid,+star.dataset.star);return}
  const card=e.target.closest('.pc');
  if(card&&!e.target.closest('.sr'))openDetail(card.dataset.pmid);
});

// フィルタ（委譲）
document.getElementById('filters').addEventListener('click',function(e){
  const chip=e.target.closest('.filter-chip');
  if(chip){activeF=chip.dataset.fid;renderF();renderL()}
});

// 検索（デバウンス）
let _searchT;
document.getElementById('searchInput').addEventListener('input',function(){clearTimeout(_searchT);_searchT=setTimeout(renderL,200)});

// ─── 既読切替 ───
async function toggleRead(pmid){
  const p=papers.find(x=>x.pmid===pmid);if(!p)return;
  p.checked=!p.checked;
  await saveChange(p);sortP();renderF();renderL();
  showT(p.checked?'既読にしました':'未読に戻しました');
}

// ─── ★評価 ───
async function setRating(pmid,v){
  const p=papers.find(x=>x.pmid===pmid);if(!p)return;
  p.rating=p.rating===v?0:v;
  await saveChange(p);renderF();renderL();
  if(curPmid===pmid){const el=document.getElementById('ds');if(el)el.innerHTML=dStars(pmid,p.rating)}
}

// ─── 詳細 ───
function dStars(pmid,r){let h='';for(let i=1;i<=5;i++)h+=`<button class="dsb${i<=r?' on':''}" data-star="${i}">★</button>`;return h}

function openDetail(pmid){
  const p=papers.find(x=>x.pmid===pmid);if(!p)return;
  curPmid=pmid;
  const ov=document.getElementById('dov'),body=document.getElementById('dbody');
  document.getElementById('dht').textContent=p.queryLabel||'';
  const pu=`https://pubmed.ncbi.nlm.nih.gov/${p.pmid}/`;
  const doi=p.doi?`https://doi.org/${p.doi}`:'';
  body.innerHTML=`
<div class="dtitle">${E(p.titleJa||p.titleEn||'')}</div>
<div class="dmeta"><span class="dmi">${E(p.journal||'')}</span><span class="dmi">${fmtD(p.pubDate)}</span><span class="dmi">PMID:${p.pmid}</span></div>
<div class="dsec"><div class="dsl">アブストラクト（日本語）</div><div class="dabs">${E(p.abstractJa||'(アブストラクトなし)')}</div></div>
<div class="coll"><button class="ctog" onclick="this.classList.toggle('op');this.nextElementSibling.classList.toggle('op')"><span class="carr">▶</span> Abstract（原文）</button><div class="cbod"><div class="dabse">${E(p.abstractEn||'(No abstract)')}</div></div></div>
<div class="coll"><button class="ctog" onclick="this.classList.toggle('op');this.nextElementSibling.classList.toggle('op')"><span class="carr">▶</span> 原文タイトル</button><div class="cbod"><div class="dabse">${E(p.titleEn||'')}</div></div></div>
<div class="dsec"><div class="dsl">著者</div><div class="dauth">${E(p.authors||'')}</div></div>
<div><a class="dlink" href="${pu}" target="_blank">PubMedで開く ↗</a>${doi?`<br><a class="dlink" href="${doi}" target="_blank">DOI: ${E(p.doi)} ↗</a>`:''}</div>
<div class="cpgrp"><button class="cpbtn" data-cp="abs">📋 コピー</button><button class="cpbtn" data-cp="ai">🤖 AI用コピー</button></div>
<div class="dact">
  <div class="arow"><button class="ctgl${p.checked?' on':''}" id="ctgl"></button><span class="albl">既読</span></div>
  <div class="arow"><span class="albl" style="margin-right:4px">興味度</span><div class="dstars" id="ds">${dStars(pmid,p.rating)}</div></div>
  <div class="dsl" style="margin-top:14px">メモ</div>
  <textarea class="mtxt" id="mtxt" placeholder="メモを入力...">${E(p.memo||'')}</textarea>
  <div class="mhint">フォーカスを外すと自動保存</div>
</div>`;
  updateNav();
  ov.style.transform='';ov.style.transition='transform .3s ease';ov.classList.add('open');
}
function closeDetail(){
  const ov=document.getElementById('dov');ov.style.transition='transform .3s ease';ov.style.transform='translateX(100%)';
  setTimeout(()=>{ov.classList.remove('open');ov.style.transform='';ov.style.transition=''},350);curPmid=null;
}
function navDetail(dir){if(!curPmid)return;const i=filtered.findIndex(p=>p.pmid===curPmid);const n=i+dir;if(n>=0&&n<filtered.length)openDetail(filtered[n].pmid)}
function updateNav(){const i=filtered.findIndex(p=>p.pmid===curPmid);document.getElementById('np').disabled=i<=0;document.getElementById('nn').disabled=i<0||i>=filtered.length-1}

// 詳細イベント委譲
document.getElementById('dov').addEventListener('click',function(e){
  const cp=e.target.closest('[data-cp]');
  if(cp){const m=cp.dataset.cp;m==='abs'?copyAbs():copyAI();return}
  if(e.target.closest('#ctgl')){toggleReadDetail();return}
  const sb=e.target.closest('.dsb');
  if(sb){setRating(curPmid,+sb.dataset.star);return}
});
document.getElementById('backBtn').addEventListener('click',closeDetail);
document.getElementById('np').addEventListener('click',()=>navDetail(-1));
document.getElementById('nn').addEventListener('click',()=>navDetail(1));
document.getElementById('dov').addEventListener('focusout',function(e){if(e.target.id==='mtxt')saveMemo()});

async function toggleReadDetail(){
  if(!curPmid)return;const p=papers.find(x=>x.pmid===curPmid);if(!p)return;
  p.checked=!p.checked;document.getElementById('ctgl').classList.toggle('on',p.checked);
  await saveChange(p);sortP();renderF();renderL();
}
async function saveMemo(){
  if(!curPmid)return;const p=papers.find(x=>x.pmid===curPmid);if(!p)return;
  const ta=document.getElementById('mtxt');if(!ta||ta.value===p.memo)return;
  p.memo=ta.value;await saveChange(p);renderL();showT('メモを保存しました');
}

// コピー
function copyAbs(){const p=papers.find(x=>x.pmid===curPmid);if(!p)return;clip([`Title: ${p.titleEn}`,`Journal: ${p.journal}`,`PMID: ${p.pmid}`,p.doi?`DOI: ${p.doi}`:'',`Authors: ${p.authors}`,'','Abstract:',p.abstractEn||'(No abstract)'].filter(Boolean).join('\n'));showT('コピーしました')}
function copyAI(){const p=papers.find(x=>x.pmid===curPmid);if(!p)return;clip([AI_PROMPT,'','---','',`Title: ${p.titleEn}`,`Journal: ${p.journal}`,`PMID: ${p.pmid}`,p.doi?`DOI: ${p.doi}`:'',`Authors: ${p.authors}`,'','Abstract:',p.abstractEn||'(No abstract)'].filter(Boolean).join('\n'));showT('AI用コピーしました')}
function clip(t){if(navigator.clipboard?.writeText)navigator.clipboard.writeText(t).catch(()=>fbClip(t));else fbClip(t)}
function fbClip(t){const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;left:-9999px';document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a)}

// 詳細スワイプバック
(function(){let sx=0,tracking=false;
const ov=document.getElementById('dov');
ov.addEventListener('touchstart',e=>{if(e.touches[0].clientX>30){tracking=false;return}sx=e.touches[0].clientX;tracking=true;ov.style.transition='none'},{passive:true});
ov.addEventListener('touchmove',e=>{if(!tracking)return;const dx=e.touches[0].clientX-sx;const dy=Math.abs(e.touches[0].clientY-(e.touches[0].clientY));if(dx>0)ov.style.transform=`translateX(${dx}px)`},{passive:true});
ov.addEventListener('touchend',e=>{if(!tracking)return;tracking=false;const dx=e.changedTouches[0].clientX-sx;ov.style.transition='transform .3s ease';if(dx>100)closeDetail();else ov.style.transform='translateX(0)'},{passive:true});
})();

// ─── 保存 ───
async function saveChange(p){
  await dbPut('papers',{...p});
  const payload={pmid:p.pmid,checked:p.checked,memo:p.memo,rating:p.rating};
  if(online){try{await apiP({action:'update',...payload})}catch(e){await dbPut('pending',payload)}}
  else await dbPut('pending',payload);
}

// ─── オンライン/オフライン ───
window.addEventListener('online',()=>{online=true;document.getElementById('statusDot').classList.remove('offline');showT('オンラインに復帰');syncData()});
window.addEventListener('offline',()=>{online=false;document.getElementById('statusDot').classList.add('offline');showT('オフラインモード')});

// ─── 初期化 ───
async function init(){
  if('serviceWorker' in navigator)try{await navigator.serviceWorker.register('./sw.js')}catch(e){}
  if(!await loadCfg()){document.getElementById('setupScreen').style.display='';return}
  document.getElementById('mainApp').style.display='';
  await loadLocal();if(online)syncData();
}
init();
</script>
</body>
</html>
