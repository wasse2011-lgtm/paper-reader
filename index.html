<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>PubMed Paper Reader</title>
<link rel="manifest" href="./manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bgc:#1a1d27;--bgi:#1e2130;--bgd:#13151d;
  --tx:#e4e4e7;--td:#9193a0;--tf:#5c5e6e;
  --ac:#60a5fa;--acd:#2563eb;--gr:#4ade80;--am:#f59e0b;--nw:#f472b6;
  --bd:#2a2d3a;--r:12px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  /* iPhoneのステータスバーを考慮し、最小44pxを確保 */
  --ht:max(var(--st), 44px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}

/* メインヘッダー */
.hd{position:sticky;top:0;z-index:100;padding:var(--ht) 16px 8px;background:var(--bg);border-bottom:1px solid var(--bd)}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.htl{font-size:18px;font-weight:700}
.ha{display:flex;gap:8px;align-items:center}
.sybtn{display:flex;align-items:center;gap:6px;background:var(--acd);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
.sybtn:active{opacity:.7}.sybtn.sy .si{animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:none}.sd.off{display:block;background:#f87171}
.ptr{text-align:center;padding:12px;font-size:13px;color:var(--ac);font-weight:600;transition:max-height .3s,opacity .3s;max-height:0;opacity:0;overflow:hidden}
.ptr.show{max-height:50px;opacity:1}.ptr.loading{color:var(--am)}
.nbanner{display:none;margin:0 16px 8px;padding:10px 14px;background:linear-gradient(135deg,#831843,#be185d);border-radius:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center;animation:fi .3s}
.nbanner.show{display:block}.nbanner span{font-size:11px;font-weight:400;opacity:.8;margin-left:6px}
@keyframes fi{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.sbar{position:relative;margin-bottom:10px}
.sinp{width:100%;background:var(--bgi);border:1px solid var(--bd);border-radius:10px;padding:10px 130px 10px 36px;color:var(--tx);font-size:16px;outline:none}
.sinp:focus{border-color:var(--ac)}.sinp::placeholder{color:var(--tf)}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tf);font-size:14px}
.sortbtn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--bgi);border:1px solid var(--bd);border-radius:8px;font-size:11px;color:var(--td);cursor:pointer;padding:4px 8px;white-space:nowrap}

/* スプラッシュ */
.splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.splash.hide{opacity:0;pointer-events:none}
.splash-icon{font-size:64px;margin-bottom:12px}
.splash-title{font-size:22px;font-weight:800;color:var(--tx)}
.splash-sub{font-size:13px;color:var(--tf);margin-top:4px}
.fl{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}.fl::-webkit-scrollbar{display:none}
.fc{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--td);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.fc.a{background:var(--ac);color:#fff;border-color:var(--ac)}
.fc.ag{background:var(--gr);color:#000;border-color:var(--gr)}
.fc.aa{background:var(--am);color:#000;border-color:var(--am)}
.fc.ap{background:var(--nw);color:#fff;border-color:var(--nw)}
.fb{display:inline-block;margin-left:4px;padding:0 5px;border-radius:8px;font-size:10px;font-weight:700;background:rgba(255,255,255,.2)}

/* 統計・設定・単語帳共通モーダルヘッダー */
.stmod-hd, .cfgmod-hd, .vmod-hd, .memo-fs-hd {
  position:sticky;top:0;z-index:10;background:var(--bgd);border-bottom:1px solid var(--bd);padding:0 16px 12px;
  padding-top: var(--ht);
  text-align:center;
}

.smini{margin:0 16px 10px;background:var(--bgc);border-radius:var(--r);padding:10px 14px;border:1px solid var(--bd);display:none;cursor:pointer}
.smini.show{display:flex;align-items:center;justify-content:space-between}
.smini-left{display:flex;align-items:center;gap:12px}
.smini .fire{font-size:15px}
.smini .streak{font-size:14px;font-weight:700;color:var(--am)}
.smini .mcount{font-size:12px;color:var(--td)}
.smini .mcount b{color:var(--tx);font-weight:700}
.smini .chart-btn{font-size:18px;opacity:.6}

.stmod{position:fixed;inset:0;z-index:300;background:var(--bgd);transform:translateY(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.stmod.open{transform:translateY(0)}
.stmod-handle, .vmod-handle{width:36px;height:4px;border-radius:2px;background:var(--tf);margin:10px auto 12px;opacity:.5}
.stmod-hd-row, .vmod-hd-row{display:flex;align-items:center;justify-content:space-between}
.stmod-title, .vmod-title{font-size:17px;font-weight:700}
.stmod-close, .vmod-close{background:var(--bgi);border:1px solid var(--bd);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;padding:6px 16px;border-radius:8px}
.stmod-body{padding:20px 16px calc(var(--sb)+40px)}

/* 既読ヒートマップ・チャート */
.streak-hero{text-align:center;margin-bottom:28px}
.streak-num{font-size:48px;font-weight:800;color:var(--am);line-height:1}
.streak-label{font-size:13px;color:var(--td);margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:28px}
.stat-card{background:var(--bgc);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--bd)}
.stat-val{font-size:22px;font-weight:800;color:var(--tx)}
.stat-lbl{font-size:11px;color:var(--tf);margin-top:2px}
.hm-sec{margin-bottom:28px}
.hm-title{font-size:13px;font-weight:700;color:var(--td);margin-bottom:10px}
.hm-wrap{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.hm-wrap::-webkit-scrollbar{display:none}
.hm-col{display:flex;flex-direction:column;gap:3px}
.hm-mlbl{font-size:9px;color:var(--tf);text-align:center;margin-bottom:3px;min-width:12px;height:12px}
.hm-dlbl{font-size:9px;color:var(--tf);text-align:right;min-width:16px;height:12px;line-height:12px;padding-right:4px}
.hm-cell{width:12px;height:12px;border-radius:3px;background:var(--bgi)}
.hm-cell.l1,.hm-legend-cell.l1{background:#1a4731}.hm-cell.l2,.hm-legend-cell.l2{background:#22763d}.hm-cell.l3,.hm-legend-cell.l3{background:#2ea043}.hm-cell.l4,.hm-legend-cell.l4{background:var(--gr)}
.hm-legend{display:flex;align-items:center;gap:6px;margin-top:8px;justify-content:flex-end}
.hm-legend-lbl{font-size:10px;color:var(--tf)}
.hm-legend-cell{width:10px;height:10px;border-radius:2px}
.wk-sec{margin-bottom:20px}
.wk-title{font-size:13px;font-weight:700;color:var(--td);margin-bottom:10px}
.wk-chart{display:flex;align-items:flex-end;gap:8px;height:100px;padding:0 8px}
.wk-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wk-bar-fill{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height .3s}
.wk-bar-fill.cur{background:var(--ac)}.wk-bar-fill.prev{background:var(--acd)}
.wk-bar-n{font-size:13px;font-weight:700;color:var(--tx)}
.wk-bar-l{font-size:11px;color:var(--tf)}

/* 論文リスト */
.pl{padding:0 16px calc(var(--sb)+20px)}
.pcnt{font-size:12px;color:var(--tf);margin-bottom:10px;padding-top:12px}
.cw{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:10px}
.swb{position:absolute;top:0;bottom:0;right:0;width:90px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:var(--r);pointer-events:none}
.swb.tr{background:var(--gr);color:#000}.swb.tu{background:var(--am);color:#000}
.cd{position:relative;z-index:1;background:var(--bgc);border-radius:var(--r);padding:14px 16px;cursor:pointer;border:1px solid transparent;touch-action:pan-y}
.cd.rd{border-left:3px solid var(--gr)}.cd.rd .ptt{color:var(--td)}.cd.rd .pjn{color:var(--tf)}.cd.rd .plb{opacity:.5}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.plb{flex-shrink:0;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--acd);color:var(--ac);letter-spacing:.03em}
.nwb{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--nw);color:#fff;margin-left:4px}
.pdt{font-size:11px;color:var(--tf);flex-shrink:0}
.ptt{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;color:var(--tx)}
.pjn{font-size:12px;color:var(--td)}
.pbt{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.pm{font-size:11px;color:var(--ac)}.prd{font-size:10px;color:var(--tf);margin-left:8px}
.sr{display:flex;gap:1px}
.st{background:none;border:none;font-size:16px;padding:0 1px;cursor:pointer;color:var(--tf);line-height:1;-webkit-tap-highlight-color:transparent}.st.on{color:var(--am)}

/* 詳細画面 */
.dov{position:fixed;inset:0;z-index:200;background:var(--bgd);transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;will-change:transform}
.dov.open{transform:translateX(0)}
.dh{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px;padding:var(--ht) 16px 10px;background:var(--bgd);border-bottom:1px solid var(--bd)}
.bb{background:none;border:none;color:var(--ac);font-size:16px;cursor:pointer;padding:4px;display:flex;align-items:center}
.dht{font-size:14px;font-weight:600;color:var(--td);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
.dn{display:flex;gap:4px}
.nb{background:none;border:1px solid var(--bd);color:var(--td);border-radius:8px;width:34px;height:34px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nb:disabled{opacity:.3}.nb:active:not(:disabled){background:var(--bgi)}
.dbdy{padding:16px 20px calc(var(--sb)+40px)}
.dm{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.di{font-size:12px;color:var(--td);background:var(--bgi);padding:4px 10px;border-radius:6px}
.ds{margin-bottom:20px}.dl{font-size:11px;font-weight:700;color:var(--tf);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.dti{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:16px}
.da{font-size:14px;line-height:1.8;white-space:pre-wrap}
.dae{font-size:13px;line-height:1.7;color:var(--td);white-space:pre-wrap}
.dau{font-size:13px;color:var(--td);line-height:1.6}
.dlk{display:inline-block;margin-top:8px;color:var(--ac);text-decoration:none;font-size:13px;font-weight:500}
.co{margin-bottom:20px}.ct{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--tf);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;padding:0;margin-bottom:6px}
.ca{transition:transform .2s;font-size:10px}.ct.op .ca{transform:rotate(90deg)}.cb{display:none}.cb.op{display:block}
.cpg{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.cp{display:flex;align-items:center;gap:6px;padding:10px 14px;border:1px solid var(--bd);border-radius:10px;background:var(--bgi);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;flex:1;justify-content:center}
.cp:active{background:var(--acd);border-color:var(--ac)}
.dact{margin-top:24px;padding-top:20px;border-top:1px solid var(--bd)}
.ar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.tgl{width:44px;height:26px;border-radius:13px;border:none;background:var(--bd);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--gr)}.tgl::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}.tgl.on::after{transform:translateX(18px)}
.al{font-size:14px;font-weight:500}
.dsr{display:flex;gap:4px}
.dsb{background:none;border:none;font-size:24px;padding:2px;cursor:pointer;color:var(--tf);-webkit-tap-highlight-color:transparent}.dsb.on{color:var(--am)}
.mt{width:100%;min-height:100px;background:var(--bgi);border:1px solid var(--bd);border-radius:10px;padding:12px;color:var(--tx);font-size:14px;font-family:inherit;line-height:1.6;resize:vertical;outline:none}
.mt:focus{border-color:var(--ac)}.mt::placeholder{color:var(--tf)}.mh{font-size:11px;color:var(--tf);margin-top:6px}

/* 全画面メモ */
.memo-fs{display:none;position:fixed;inset:0;z-index:280;background:var(--bgd);flex-direction:column}
.memo-fs.open{display:flex}
.memo-fs-title{font-size:15px;font-weight:700}
.memo-fs-close{background:var(--bgi);border:1px solid var(--bd);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;padding:6px 16px;border-radius:8px}
.memo-fs-ta{flex:1;width:100%;background:var(--bgd);border:none;padding:16px 20px;color:var(--tx);font-size:15px;font-family:inherit;line-height:1.8;resize:none;outline:none}
.memo-fs-ta::placeholder{color:var(--tf)}

/* セットアップ・単語帳その他 */
.su{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
.sut{font-size:22px;font-weight:700;margin-bottom:8px}
.sud{font-size:14px;color:var(--td);margin-bottom:24px;line-height:1.6}
.sui{width:100%;max-width:400px;background:var(--bgi);border:1px solid var(--bd);border-radius:10px;padding:12px;color:var(--tx);font-size:14px;font-family:monospace;outline:none;margin-bottom:12px}
.sui:focus{border-color:var(--ac)}.sui::placeholder{color:var(--tf)}
.sub{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer}.sub:active{opacity:.8}
.em{text-align:center;padding:60px 20px;color:var(--tf)}.emi{font-size:48px;margin-bottom:12px}.emt{font-size:14px;line-height:1.6}
.lb{position:fixed;top:0;left:0;height:3px;background:var(--ac);z-index:999;transition:width .3s}
.toast{position:fixed;bottom:calc(var(--sb)+24px);left:50%;transform:translateX(-50%) translateY(100px);background:var(--bgc);color:var(--tx);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* 設定画面 */
.cfgbtn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent;opacity:.7}
.cfgmod{position:fixed;inset:0;z-index:300;background:var(--bgd);transform:translateY(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cfgmod.open{transform:translateY(0)}
.cfgmod-body{padding:16px 16px calc(var(--sb)+40px)}
.cfg-sec{margin-bottom:20px}
.cfg-sec-title{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:10px}
.cfg-remote-tag{font-size:10px;color:var(--ac);background:var(--bgi);padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:500}
.cfg-lbl{display:block;font-size:12px;color:var(--td);margin-bottom:4px;margin-top:10px}
.cfg-inp{width:100%;background:var(--bgi);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:16px;outline:none;font-family:inherit}
.cfg-savebtn{width:100%;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}

/* 単語帳 */
.vmod{position:fixed;inset:0;z-index:300;background:var(--bgd);transform:translateY(100%);transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.vmod.open{transform:translateY(0)}
.vmod-body{padding:16px 16px calc(var(--sb)+40px)}
.vmod-add{display:flex;gap:8px;margin-bottom:16px}
.vmod-inp{flex:1;background:var(--bgi);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:14px;outline:none}
.vmod-addbtn{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.vcard{background:var(--bgc);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.vcard-word{font-size:15px;font-weight:700;color:var(--ac)}
.vmini{margin:0 16px 10px;background:var(--bgc);border-radius:var(--r);padding:10px 14px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:14px;font-weight:600}
.abs-word{cursor:pointer;border-radius:2px;-webkit-tap-highlight-color:rgba(96,165,250,0.2)}

/* 単語検索ダイアログ */
.wdlg-ov{display:none;position:fixed;inset:0;z-index:270;background:rgba(0,0,0,.5)}
.wdlg-ov.show{display:flex;align-items:flex-end;justify-content:center}
.wdlg{width:100%;max-width:400px;background:var(--bgd);border-radius:16px 16px 0 0;padding:20px 16px calc(var(--sb) + 16px);animation:wdIn .2s ease}
@keyframes wdIn{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="splash" id="splash"><div class="splash-icon">📄</div><div class="splash-title">Paper Reader</div><div class="splash-sub">PubMed論文リーダー</div></div>
<div id="su" class="su" style="display:none">
  <div class="sut">PubMed Paper Reader</div>
  <div class="sud">GAS Web AppのURLとAPIキーを設定してください。</div>
  <input id="suUrl" class="sui" placeholder="GAS Web App URL"/>
  <input id="suKey" class="sui" placeholder="API Secret Key"/>
  <button class="sub" onclick="saveSetup()">設定を保存</button>
</div>
<div id="ma" style="display:none">
  <div class="lb" id="lb" style="width:0"></div>
  <div class="hd">
    <div class="ht"><div class="htl">📄 Paper Reader</div><div class="ha"><div class="sd" id="sd"></div><button class="sybtn" id="sy" onclick="syncData()"><span class="si">↻</span> 同期</button><button class="cfgbtn" onclick="openCfg()">⚙️</button></div></div>
    <div class="sbar"><span class="sico">🔍</span><input class="sinp" id="si" placeholder="検索"/><button class="sortbtn" id="sortBtn" onclick="cycleSort()">↕</button></div>
    <div class="fl" id="fl"></div>
  </div>
  <div class="smini" id="smini" onclick="openStats()">
    <div class="smini-left"><span class="fire">🔥</span><span class="streak" id="sms"></span><span class="mcount" id="smm"></span></div>
    <span class="chart-btn">📊</span>
  </div>
  <div class="vmini" id="vminiBar" onclick="openVocab()">
    <span>📖 単語帳</span><span class="vmini-cnt" id="vmcnt"></span><span class="chart-btn">▶</span>
  </div>
  <div class="ptr" id="ptr">↓ 引っ張って同期</div>
  <div class="nbanner" id="nban"></div>
  <div class="pl" id="pl"></div>
</div>
<div class="dov" id="dov">
  <div class="dh"><button class="bb" id="bk">← 戻る</button><div class="dht" id="dht"></div><div class="dn"><button class="nb" id="np">◀</button><button class="nb" id="nn">▶</button></div></div>
  <div class="dbdy" id="dbdy"></div>
</div>
<div class="memo-fs" id="memoFs">
  <div class="memo-fs-hd"><span class="memo-fs-title">📝 メモ</span><button class="memo-fs-close" id="memoFsClose">完了</button></div>
  <textarea class="memo-fs-ta" id="memoFsTa" placeholder="メモを入力..."></textarea>
</div>
<div class="vmod" id="vmod">
  <div class="vmod-hd"><div class="vmod-handle"></div><div class="vmod-hd-row"><span class="vmod-title">📖 単語帳</span><button class="vmod-close" onclick="closeVocab()">閉じる ✕</button></div></div>
  <div class="vmod-body" id="vmod-body">
    <div class="vmod-add"><input class="vmod-inp" id="vinp" placeholder="単語を入力..."/><button class="vmod-addbtn" onclick="addWordManual()">追加</button></div>
    <div class="vmod-count" id="vcnt"></div>
    <div id="vlist"></div>
  </div>
</div>
<div class="wdlg-ov" id="wdov">
  <div class="wdlg" id="wdlg">
    <div class="wdlg-word" id="wd-word"></div>
    <div class="wdlg-status" id="wd-status"></div>
    <div class="wdlg-meaning" id="wd-meaning" style="display:none"></div>
    <textarea class="wdlg-edit" id="wd-edit" placeholder="意味を入力・編集"></textarea>
    <div class="wdlg-ctx" id="wd-ctx"></div>
    <div class="wdlg-btns">
      <button class="wdlg-btn pri" id="wd-reg">📖 単語帳に登録</button>
      <button class="wdlg-btn sec" id="wd-cancel">閉じる</button>
    </div>
    <div class="wdlg-row2">
      <button class="wdlg-btn ggl" id="wd-google">🔍 Googleで検索</button>
    </div>
  </div>
</div>
<div class="stmod" id="stmod">
  <div class="stmod-hd"><div class="stmod-handle"></div><div class="stmod-hd-row"><span class="stmod-title">📊 読書記録</span><button class="stmod-close" onclick="closeStats()">閉じる ✕</button></div></div>
  <div class="stmod-body" id="stmod-body"></div>
</div>
<div class="cfgmod" id="cfgmod">
  <div class="cfgmod-hd"><div class="vmod-handle"></div><div class="vmod-hd-row"><span class="vmod-title">⚙️ 設定</span><button class="vmod-close" onclick="closeCfg()">閉じる ✕</button></div></div>
  <div class="cfgmod-body" id="cfgmod-body">
    <div id="cfg-queries"></div>
    <button class="cfg-savebtn" onclick="saveCfgAll()">💾 設定を保存</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* 既存ロジックをすべて保持（省略せず全出力） */
const EM={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function E(s){return s?String(s).replace(/[&<>"']/g,c=>EM[c]):''}
function fD(s){if(!s)return'';try{const ms={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};const m2=String(s).match(/^(\d{4})-([A-Za-z]{3})(?:-(\d+))?$/);if(m2){const y=+m2[1],m=ms[m2[2]],dy=m2[3]?+m2[3]:0;const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];return dy?y+'年'+mn[m]+dy+'日':y+'年'+mn[m]}const d=new Date(s);if(isNaN(d))return s;const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];return d.getFullYear()+'年'+mn[d.getMonth()]+d.getDate()+'日';}catch{return s}}
function toKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function sL(p){document.getElementById('lb').style.width=p+'%'}
let _tt;function sT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500)}
function isNew(p){if(!p.fetchedDate)return false;return(Date.now()-new Date(p.fetchedDate).getTime())<S.newDays*86400000}

const DBN='PaperReaderDB',DBV=4;
function oDB(){return new Promise((r,j)=>{const q=indexedDB.open(DBN,DBV);q.onupgradeneeded=e=>{const d=e.target.result;['papers','pending','config'].forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n,{keyPath:n==='config'?'key':'pmid'})});if(!d.objectStoreNames.contains('vocab'))d.createObjectStore('vocab',{keyPath:'id'})};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dGA(s){const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readonly');t.objectStore(s).getAll().onsuccess=e=>r(e.target.result);t.onerror=()=>j(t.error)})}
async function dP(s,v){const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(v);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dC(s){const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).clear();t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}
async function dPB(s,items){if(!items.length)return;const d=await oDB();return new Promise((r,j)=>{const t=d.transaction(s,'readwrite');const st=t.objectStore(s);for(const i of items)st.put(i);t.oncomplete=()=>r();t.onerror=()=>j(t.error)})}

let C={url:'',key:''},P=[],F=[],aF='all',cP=null,ol=navigator.onLine;
let S={newDays:7,minStar:4,defFilter:'all',sortOrder:'default',aiDest:'copy',vocabEnabled:true,aiPrompts:[{name:'要約',prompt:'内容を要約して'}]};

async function lC(){try{const c=await dGA('config');const o=c.find(x=>x.key==='ac');if(o&&o.u&&o.k){C.url=o.u;C.key=o.k;return true}}catch(e){}return false}
async function saveSetup(){const u=document.getElementById('suUrl').value.trim(),k=document.getElementById('suKey').value.trim();if(!u||!k){sT('URLとAPIキーを入力');return}C.url=u;C.key=k;await dP('config',{key:'ac',u,k});document.getElementById('su').style.display='none';document.getElementById('ma').style.display='';syncData()}

let _jc=0;
function jp(p){return new Promise((r,j)=>{const cb='_j'+ _jc++;const tm=setTimeout(()=>{cl();j(new Error('Timeout'))},15000);function cl(){clearTimeout(tm);delete window[cb];const e=document.getElementById(cb);if(e)e.remove()}window[cb]=d=>{cl();r(d)};const q=new URLSearchParams({...p,key:C.key,callback:cb});const s=document.createElement('script');s.id=cb;s.src=C.url+'?'+q;s.onerror=()=>{cl();j(new Error('JSONP failed'))};document.head.appendChild(s)})}

async function syncData(){
  if(!ol){sT('オフラインです');return}
  const btn=document.getElementById('sy');btn.classList.add('sy');sL(20);
  try{
    const pend=await dGA('pending');
    const pendP=pend.length?jp({action:'bulkUpdate',data:JSON.stringify({updates:pend}),key:C.key}).then(()=>dC('pending')).catch(()=>{}):Promise.resolve();
    const listP=jp({action:'list',key:C.key});
    const [,data]=await Promise.all([pendP,listP]);
    sL(70);
    if(data.papers){
      P=data.papers.map(sp=>({...sp,rating:Number(sp.rating)||0,checked:!!sp.checked}));
      dPB('papers',P);sortP();rF();rL();rSt();updateBanner();
      sT('同期完了: '+P.length+'件');
    }
  }catch(e){sT('同期エラー: '+e.message)}
  finally{btn.classList.remove('sy');sL(100);setTimeout(()=>sL(0),200)}
}

async function loadL(){try{P=(await dGA('papers')).map(p=>({...p,rating:p.rating||0,checked:!!p.checked}));sortP();rF();rL();rSt();updateBanner()}catch(e){}}
function sortP(){P.sort((a,b)=>{const x=a.pubDate||'',y=b.pubDate||'';return x<y?1:x>y?-1:0})}
function rSt(){const rm=new Map();P.forEach(p=>{if(p.readAt){const k=toKey(new Date(p.readAt));rm.set(k,(rm.get(k)||0)+1)}});const s=document.getElementById('sms');if(s)s.textContent=P.filter(p=>p.checked).length+'件既読';}
function updateBanner(){const nc=P.filter(p=>isNew(p)).length;const ban=document.getElementById('nban');if(nc>0){ban.innerHTML=`🆕 新着 ${nc} 件`;ban.classList.add('show')}else ban.classList.remove('show')}
function rF(){const c=document.getElementById('fl');c.innerHTML=`<button class="fc a" onclick="aF='all';rL()">すべて <span class="fb">${P.length}</span></button>`;}
function rL(){
  const c=document.getElementById('pl'),s=document.getElementById('si').value.trim().toLowerCase();
  let list=P; if(s)list=list.filter(p=>(p.titleJa||p.titleEn||'').toLowerCase().includes(s));
  c.innerHTML=list.map(p=>`<div class="cw" data-p="${p.pmid}"><div class="cd${p.checked?' rd':''}" onclick="openD('${p.pmid}')"><div class="ptt">${E(p.titleJa||p.titleEn)}</div><div class="pjn">${E(p.journal)}</div></div></div>`).join('');
}

function openD(pm){const p=P.find(x=>x.pmid===pm);if(!p)return;cP=pm;document.getElementById('dht').textContent=p.pmid;document.getElementById('dbdy').innerHTML=`<h3>${E(p.titleJa||p.titleEn)}</h3><p>${E(p.abstractJa||p.abstractEn)}</p>`;document.getElementById('dov').classList.add('open');}
function clD(){document.getElementById('dov').classList.remove('open');cP=null}
function openCfg(){document.getElementById('cfgmod').classList.add('open')}
function closeCfg(){document.getElementById('cfgmod').classList.remove('open')}
async function saveCfgAll(){closeCfg();sT('設定保存（ダミー）')}

document.getElementById('bk').addEventListener('click',clD);

async function init(){
  const hideSplash=()=>{const sp=document.getElementById('splash');sp.classList.add('hide');setTimeout(()=>sp.remove(),500)};
  if(!await lC()){document.getElementById('su').style.display='';hideSplash();return}
  document.getElementById('ma').style.display='';
  await loadL();
  hideSplash();
  if(ol)syncData();
}
init();
</script>
</body>
</html>
